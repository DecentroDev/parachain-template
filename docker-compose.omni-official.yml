services:
  prmx-omni-node:
    image: parity/polkadot-omni-node:latest
    container_name: prmx-omni-node
    ports:
      - "9944:9944"
    volumes:
      - "./working_chain_spec.json:/chain_spec.json:ro"
      - "omni_data:/data"
    command: >
      --dev
      --chain=/chain_spec.json
      --base-path=/data
      --rpc-port=9944
      --unsafe-rpc-external
      --rpc-cors=all
      --unsafe-force-node-key-generation
      --dev-block-time=1000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9944/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  omni_data: