version: '3.8'

services:
  prmx-omni-node:
    container_name: prmx-omni-node
    build:
      context: .
      dockerfile: Dockerfile.omni
    networks:
      - prmx
    ports:
      - "127.0.0.1:9944:9944"  # RPC/WebSocket
      - "127.0.0.1:30333:30333" # P2P
    volumes:
      - omni-node-data:/data
    environment:
      - RUST_LOG=info
    restart: unless-stopped

  prmx-db-model:
    container_name: prmx-db-model
    image: postgres:15
    networks:
      - prmx
    ports:
      - "127.0.0.1:5433:5432"
    environment:
      - POSTGRES_USER=mod
      - POSTGRES_PASSWORD=pass
      - POSTGRES_DB=prmx-model
    volumes:
      - postgres-model-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mod -d prmx-model"]
      interval: 10s
      timeout: 5s
      retries: 5

  prmx-queue:
    container_name: prmx-queue
    image: rabbitmq:3-management
    networks:
      - prmx
    ports:
      - "127.0.0.1:5672:5672"
      - "127.0.0.1:15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  prmx-backend-api:
    container_name: prmx-backend-api
    build:
      context: ../prmx/backend-api
    networks:
      - prmx
    ports:
      - "127.0.0.1:3001:3001"
    env_file: ../prmx/backend-api/.env
    environment:
      - DB_HOST=prmx-db-model
      - DB_PORT=5433
      - DB_USER=mod
      - DB_PASS=pass
      - DB_DATABASE_NAME=prmx-model
      - QUEUE_HOST=prmx-queue
      - QUEUE_USER=guest
      - QUEUE_PASS=guest
      # Connect to Omni Node running in Docker
      - POLKADOT_PROVIDER=ws://prmx-omni-node:9944
      - POLKADOT_BLOCK_TIME=6000
      - POLKADOT_ORACLE_MNEMO=predict domain airport nerve mosquito manage scene brick winter taxi stool airport
    depends_on:
      prmx-db-model:
        condition: service_healthy
      prmx-queue:
        condition: service_healthy
      prmx-omni-node:
        condition: service_started

  prmx-indexer:
    container_name: prmx-indexer
    build:
      context: ../prmx/indexer
    networks:
      - prmx
    ports:
      - "127.0.0.1:3000:3000"
    env_file: ../prmx/indexer/.env
    environment:
      - DB_HOST=prmx-db-model
      - DB_PORT=5433
      - DB_USER=mod
      - DB_PASS=pass
      - DB_DATABASE_NAME=prmx-model
      - QUEUE_HOST=prmx-queue
      - QUEUE_USER=guest
      - QUEUE_PASS=guest
      # Connect to Omni Node running in Docker
      - POLKADOT_PROVIDER=ws://prmx-omni-node:9944
      - POLKADOT_BLOCK_TIME=6000
      - POLKADOT_ORACLE_MNEMO=predict domain airport nerve mosquito manage scene brick winter taxi stool airport
    depends_on:
      prmx-db-model:
        condition: service_healthy
      prmx-queue:
        condition: service_healthy
      prmx-omni-node:
        condition: service_started

  prmx-frontend:
    container_name: prmx-frontend
    build:
      context: ../prmx/frontend
    networks:
      - prmx
    ports:
      - "127.0.0.1:3002:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://prmx-backend-api:3001
      - NEXT_PUBLIC_INDEXER_URL=http://prmx-indexer:3000
    depends_on:
      - prmx-backend-api
      - prmx-indexer

networks:
  prmx:
    driver: bridge

volumes:
  omni-node-data:
  postgres-model-data:
