services:
  parachain-node:
    build:
      context: .
      dockerfile: Dockerfile.custom
    container_name: parachain-custom-node
    ports:
      - "9944:9944"
      - "30333:30333"
    volumes:
      - parachain_data:/data
    environment:
      - RUST_LOG=info
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9944/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  parachain_data: