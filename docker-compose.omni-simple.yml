services:
  prmx-omni-node:
    build:
      context: .
      dockerfile: Dockerfile.omni-simple
    container_name: prmx-omni-node
    ports:
      - "9944:9944"
    volumes:
      - "./chain_spec.json:/chain_spec.json:ro"
      - "omni_data:/data"
    command: >
      --dev
      --chain=/chain_spec.json
      --base-path=/data
      --rpc-port=9944
      --unsafe-rpc-external
      --rpc-cors=all
      --unsafe-force-node-key-generation
    restart: unless-stopped

volumes:
  omni_data: