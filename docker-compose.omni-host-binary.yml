services:
  prmx-omni-node:
    image: ubuntu:22.04
    container_name: prmx-omni-node
    ports:
      - "9944:9944"
    volumes:
      - "./chain_spec.json:/chain_spec.json:ro"
      - "omni_data:/data"
      - "./polkadot-omni-node:/usr/local/bin/polkadot-omni-node:ro"
    command: >
      /usr/local/bin/polkadot-omni-node
      --dev
      --chain=/chain_spec.json
      --base-path=/data
      --rpc-port=9944
      --unsafe-rpc-external
      --rpc-cors=all
      --unsafe-force-node-key-generation
    restart: unless-stopped

volumes:
  omni_data: